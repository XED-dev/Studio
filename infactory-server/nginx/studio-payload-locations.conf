# ──────────────────────────────────────────────────────────────────────────────
# Studio-Payload NGINX Locations — Auto-generiert von payload.sh
#
# Proxy-Routen für Next.js + Payload CMS + Puck + better-auth
# Hinter einem /studio/ Prefix, mit allen zusätzlichen Pfaden die die App
# über relative URLs aufruft (API, Assets, Media, Preview).
#
# Einbinden in die NGINX-Site-Config:
#   include /etc/nginx/proxy/studio-payload-locations.conf;
#
# Voraussetzung: /etc/nginx/proxy/xed.conf muss existieren
# Port: wird durch payload.sh beim Deployen ersetzt (Default: 5368)
# ──────────────────────────────────────────────────────────────────────────────

# Admin-UI + Frontend-Seiten (Puck-Editor, Page-Tree, Login)
location ^~ /studio/        { proxy_pass http://127.0.0.1:{{PORT}}/;       include /etc/nginx/proxy/xed.conf; }

# Next.js Assets (JavaScript, CSS, Images, Build-Chunks)
location ^~ /_next/          { proxy_pass http://127.0.0.1:{{PORT}}/_next/; include /etc/nginx/proxy/xed.conf; }

# Payload REST API + better-auth + GraphQL + Puck Editor API
location ^~ /api/            { proxy_pass http://127.0.0.1:{{PORT}}/api/;   include /etc/nginx/proxy/xed.conf; }

# Next.js Preview-Mode (Draft-Ansicht aktivieren/deaktivieren)
location ^~ /next/           { proxy_pass http://127.0.0.1:{{PORT}}/next/;  include /etc/nginx/proxy/xed.conf; }

# Payload Media-Uploads (Bilder, Dateien)
location ^~ /media/          { proxy_pass http://127.0.0.1:{{PORT}}/media/; include /etc/nginx/proxy/xed.conf; }

# Next.js Interna (HMR, DevTools — nur im Dev-Modus relevant, schadet nicht in Produktion)
location ^~ /__nextjs         { proxy_pass http://127.0.0.1:{{PORT}}/__nextjs; include /etc/nginx/proxy/xed.conf; }
