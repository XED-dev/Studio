# ──────────────────────────────────────────────────────────────────────────────
# /etc/nginx/proxy/xed.conf — Universelle Proxy-Settings für alle XED-Services
#
# Ghost CMS, inFactory Server (Express), Studio-Payload (Next.js + Payload + Puck)
# Eine Datei für alle Node.js-Backends hinter NGINX Reverse-Proxy.
#
# Verwendung in NGINX-Site-Configs:
#   location /xed/ { proxy_pass http://127.0.0.1:4368/; include /etc/nginx/proxy/xed.conf; }
#   location ~ ^/(studio|_next|api|next|media)(/|$) { proxy_pass http://127.0.0.1:5368; include /etc/nginx/proxy/xed.conf; }
#   location / { proxy_pass http://127.0.0.1:2368; include /etc/nginx/proxy/xed.conf; }
#
# Installiert von: curl -fsSL https://studio.xed.dev/install.sh | bash
# ──────────────────────────────────────────────────────────────────────────────

proxy_http_version          1.1;
proxy_redirect              off;
proxy_buffering             off;

proxy_set_header Host              $http_host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        "upgrade";

proxy_read_timeout    300s;
proxy_connect_timeout 60s;
proxy_send_timeout    60s;
