# ──────────────────────────────────────────────────────────────────────────────
# /etc/nginx/proxy/xed.conf — Proxy-Settings für inFactory Server (Express)
#
# Verwendung in der NGINX-Site-Config:
#   location /xed/ { proxy_pass http://127.0.0.1:4368/; include /etc/nginx/proxy/xed.conf; }
#
# Installiert von: curl -fsSL https://studio.xed.dev/install.sh | bash
# ──────────────────────────────────────────────────────────────────────────────

proxy_redirect off;
proxy_buffering off;
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;
