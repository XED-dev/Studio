# ──────────────────────────────────────────────────────────────────────────────
# /etc/nginx/proxy/payload.conf — Proxy-Settings für Studio-Payload
#
# Analog zu xed.conf (infactory-server) und ghost.conf (Ghost CMS).
# Enthält NUR Proxy-Header, KEINE Location-Definitionen.
#
# Verwendung in der NGINX-Site-Config (ein Einzeiler pro Kunde):
#
#   location ~ ^/(studio|_next|api|next|media)(/|$) {
#       proxy_pass http://127.0.0.1:5368;
#       include /etc/nginx/proxy/payload.conf;
#   }
#
# Der SysOps ändert nur die Portnummer (5368, 5369, ...).
# Installiert von: curl -fsSL https://studio.xed.dev/install.sh | bash
# ──────────────────────────────────────────────────────────────────────────────

proxy_redirect off;
proxy_buffering off;
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;

# WebSocket-Support (Puck-Editor HMR, Next.js Dev-Mode)
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
